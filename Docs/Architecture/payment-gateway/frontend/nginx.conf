# nginx.conf — served from /etc/nginx/conf.d/default.conf
# Two concerns:
#   1. SPA fallback — any unknown path returns index.html so React Router works.
#   2. API + SSE proxy — /api/core/* → core-api:8000; /api/ai/* → ai-service:8100.
#      SSE responses MUST NOT be buffered or the chat stream stalls.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip — modest CPU cost, real bandwidth win for the JS bundle.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---------- SPA fallback --------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- core-api proxy ------------------------------------------------
    location /api/core/ {
        proxy_pass http://core-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ---------- ai-service proxy (SSE-safe) ----------------------------------
    # If you forget any one of these four lines, token streaming stalls until
    # the entire response is ready. The fact that it's not OBVIOUSLY broken
    # makes this the sharpest edge in the whole stack.
    location /api/ai/ {
        proxy_pass http://ai-service:8100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_read_timeout 120s;       # long agent runs
    }
}
